<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="monospace">
  <rect width="800" height="300" fill="#0a0a1a" rx="8"/>
  <text x="400" y="45" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">🎯 Key Takeaway: Fix Descriptions First</text>

  <rect x="40" y="70" width="340" height="120" rx="8" fill="#1a0a0a" stroke="#e94560" stroke-width="1.5"/>
  <text x="210" y="100" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">❌ Wrong Approach</text>
  <text x="55" y="125" fill="#ccc" font-size="11">• Build complex classifier wrapper</text>
  <text x="55" y="145" fill="#ccc" font-size="11">• Add 100s of few-shot examples</text>
  <text x="55" y="165" fill="#ccc" font-size="11">• Add routing middleware layer</text>
  <text x="55" y="185" fill="#888" font-size="10">All add complexity &amp; token overhead</text>

  <rect x="420" y="70" width="340" height="120" rx="8" fill="#0a2d10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="590" y="100" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="bold">✅ Right Approach</text>
  <text x="435" y="125" fill="#ccc" font-size="11">• Review tool descriptions FIRST</text>
  <text x="435" y="145" fill="#ccc" font-size="11">• Add explicit entity scope ("customer")</text>
  <text x="435" y="165" fill="#ccc" font-size="11">• Add exclusion clauses ("NOT for orders")</text>
  <text x="435" y="185" fill="#888" font-size="10">FREE fix — no code changes needed</text>

  <rect x="120" y="215" width="560" height="60" rx="8" fill="#0d1f2d" stroke="#ffd700" stroke-width="1.5"/>
  <text x="400" y="238" text-anchor="middle" fill="#ffd700" font-size="15" font-weight="bold">💡 Description strings are the PRIMARY feature for LLM tool matching</text>
  <text x="400" y="258" text-anchor="middle" fill="#ccc" font-size="12">Semantic descriptions map user intent → tool schema. Fix them first before adding complexity.</text>

  <text x="400" y="292" text-anchor="middle" fill="#555" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
