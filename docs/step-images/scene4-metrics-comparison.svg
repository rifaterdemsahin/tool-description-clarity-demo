<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <rect width="800" height="400" fill="#0a0a1a" rx="8"/>
  <text x="400" y="40" text-anchor="middle" fill="#00d4aa" font-size="22" font-weight="bold">📊 Metrics: Naive vs Resilient</text>

  <!-- Bar chart - Accuracy -->
  <text x="120" y="85" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🎯 Accuracy</text>
  <rect x="40" y="100" width="160" height="30" rx="4" fill="#1a1a3e" stroke="#333" stroke-width="1"/>
  <rect x="40" y="100" width="72" height="30" rx="4" fill="#e94560"/>
  <text x="120" y="121" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">45% Naive</text>
  <rect x="220" y="100" width="160" height="30" rx="4" fill="#1a1a3e" stroke="#333" stroke-width="1"/>
  <rect x="220" y="100" width="152" height="30" rx="4" fill="#4ade80"/>
  <text x="300" y="121" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">95% Resilient</text>

  <!-- Bar chart - Token Consumption -->
  <text x="120" y="170" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔤 Avg Tokens/Q</text>
  <rect x="40" y="185" width="160" height="30" rx="4" fill="#1a1a3e" stroke="#333" stroke-width="1"/>
  <rect x="40" y="185" width="144" height="30" rx="4" fill="#e94560"/>
  <text x="120" y="206" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">900 Naive</text>
  <rect x="220" y="185" width="160" height="30" rx="4" fill="#1a1a3e" stroke="#333" stroke-width="1"/>
  <rect x="220" y="185" width="80" height="30" rx="4" fill="#4ade80"/>
  <text x="300" y="206" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">500 Resilient</text>

  <!-- Bar chart - Destructive Actions Blocked -->
  <text x="120" y="255" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">💣 Destruct Blocked</text>
  <rect x="40" y="270" width="160" height="30" rx="4" fill="#1a1a3e" stroke="#333" stroke-width="1"/>
  <rect x="40" y="270" width="32" height="30" rx="4" fill="#e94560"/>
  <text x="120" y="291" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">20% Naive</text>
  <rect x="220" y="270" width="160" height="30" rx="4" fill="#1a1a3e" stroke="#333" stroke-width="1"/>
  <rect x="220" y="270" width="160" height="30" rx="4" fill="#4ade80"/>
  <text x="300" y="291" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">100% Resilient</text>

  <!-- Token Scoreboard -->
  <rect x="420" y="60" width="350" height="280" rx="8" fill="#0d1f2d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="595" y="90" text-anchor="middle" fill="#00d4aa" font-size="16" font-weight="bold">🔤 Input Token Scoreboard</text>
  <line x1="435" y1="100" x2="755" y2="100" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="440" y="125" fill="#e94560" font-size="12">❌ Naive total tokens:  13,500</text>
  <text x="440" y="150" fill="#4ade80" font-size="12">✅ Resilient total:      7,500</text>
  <text x="440" y="178" fill="#ffd700" font-size="13" font-weight="bold">💰 Token savings:        6,000 (44%)</text>
  <text x="440" y="205" fill="#ccc" font-size="11">🧠 Why: Clear descriptions</text>
  <text x="450" y="222" fill="#aaa" font-size="10">eliminate retries and</text>
  <text x="450" y="239" fill="#aaa" font-size="10">coordinator corrections.</text>
  <text x="440" y="265" fill="#4ade80" font-size="11">💡 Fix: Rewrite description</text>
  <text x="450" y="285" fill="#aaa" font-size="10">strings — no code changes</text>
  <text x="450" y="305" fill="#aaa" font-size="10">required. FREE fix!</text>
  <text x="450" y="330" fill="#888" font-size="9">⚡ DeepSeek V4 Flash</text>

  <text x="400" y="388" text-anchor="middle" fill="#555" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
