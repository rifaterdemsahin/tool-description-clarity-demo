<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="monospace">
  <rect width="800" height="450" fill="#0a0a1a" rx="8"/>
  <text x="400" y="40" text-anchor="middle" fill="#e94560" font-size="22" font-weight="bold">❌ Naive: Wrong Tool Selection</text>

  <!-- Tool boxes showing descriptions -->
  <rect x="40" y="60" width="340" height="130" rx="6" fill="#1a0a0a" stroke="#e94560" stroke-width="1.5"/>
  <text x="210" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">🔧 get_customer</text>
  <text x="55" y="108" fill="#e94560" font-size="11">description: "Gets a customer record"</text>
  <text x="55" y="128" fill="#ff6b6b" font-size="10">⚠ Too vague — could mean anything!</text>
  <text x="55" y="148" fill="#888" font-size="10">⚠ No distinction from lookup_order</text>
  <text x="55" y="168" fill="#888" font-size="10">⚠ "order" in query → matches wrong tool</text>

  <rect x="420" y="60" width="340" height="130" rx="6" fill="#1a0a0a" stroke="#e94560" stroke-width="1.5"/>
  <text x="590" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">🔧 lookup_order</text>
  <text x="435" y="108" fill="#e94560" font-size="11">description: "Looks up an order"</text>
  <text x="435" y="128" fill="#ff6b6b" font-size="10">⚠ Also vague — "looks up" = generic</text>
  <text x="435" y="148" fill="#888" font-size="10">⚠ No differentiation from get_customer</text>
  <text x="435" y="168" fill="#888" font-size="10">⚠ Semantically identical to get_customer</text>

  <!-- Red flash area -->
  <rect x="80" y="220" width="640" height="90" rx="8" fill="#2d0000" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="252" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">⚠ AGENT FAILURE ⚠</text>
  <text x="400" y="278" text-anchor="middle" fill="#ff6b6b" font-size="14">get_customer called for order status query</text>
  <text x="400" y="298" text-anchor="middle" fill="#ff6b6b" font-size="12">Wrong data returned → user confused → coordinator must intervene</text>

  <!-- Token waste -->
  <rect x="80" y="330" width="640" height="50" rx="6" fill="#1a0a2d" stroke="#ffd700" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" fill="#ffd700" font-size="13">🔤 ~800-1200 tokens wasted on retries & correction prompts</text>
  <text x="400" y="375" text-anchor="middle" fill="#aaa" font-size="11">Each wrong call = extra roundtrip = more input tokens</text>

  <text x="400" y="435" text-anchor="middle" fill="#555" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
