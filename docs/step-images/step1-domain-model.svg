<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="monospace">
  <rect width="800" height="350" fill="#0a0a1a" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">📋 Domain Model — Tool Schemas & Entities</text>

  <rect x="20" y="55" width="230" height="130" rx="6" fill="#1a1a3e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="bold">👤 Customer</text>
  <line x1="20" y1="88" x2="250" y2="88" stroke="#818cf8" stroke-width="0.5"/>
  <text x="32" y="108" fill="#ccc" font-size="10">+ id: string</text>
  <text x="32" y="126" fill="#ccc" font-size="10">+ name: string</text>
  <text x="32" y="144" fill="#ccc" font-size="10">+ email: string</text>
  <text x="32" y="162" fill="#ccc" font-size="10">+ tier: string</text>

  <rect x="280" y="55" width="230" height="130" rx="6" fill="#1a1a3e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="395" y="78" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="bold">📦 Order</text>
  <line x1="280" y1="88" x2="510" y2="88" stroke="#818cf8" stroke-width="0.5"/>
  <text x="292" y="108" fill="#ccc" font-size="10">+ id: string</text>
  <text x="292" y="126" fill="#ccc" font-size="10">+ customerId: string</text>
  <text x="292" y="144" fill="#ccc" font-size="10">+ status: string</text>
  <text x="292" y="162" fill="#ccc" font-size="10">+ total: number</text>

  <rect x="540" y="55" width="240" height="130" rx="6" fill="#1a1a3e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="660" y="78" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="bold">🔧 ToolDefinition</text>
  <line x1="540" y1="88" x2="780" y2="88" stroke="#818cf8" stroke-width="0.5"/>
  <text x="552" y="108" fill="#ccc" font-size="10">+ name: string</text>
  <text x="552" y="126" fill="#00d4aa" font-size="10" font-weight="bold">+ description ← KEY</text>
  <text x="552" y="144" fill="#ccc" font-size="10">+ parameters: JSONSchema</text>
  <text x="552" y="162" fill="#aaa" font-size="9">LLM uses desc to match</text>

  <!-- Tools table -->
  <rect x="20" y="210" width="760" height="120" rx="6" fill="#0d1f2d" stroke="#00d4aa" stroke-width="1"/>
  <text x="400" y="238" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">🔧 Available Tools</text>
  <line x1="30" y1="248" x2="770" y2="248" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="40" y="268" fill="#e94560" font-size="10">❌ get_customer: "Gets a customer record" — too vague</text>
  <text x="40" y="286" fill="#e94560" font-size="10">❌ lookup_order: "Looks up an order" — identical pattern</text>
  <text x="40" y="304" fill="#4ade80" font-size="10">✅ get_customer: "Retrieves a CUSTOMER profile. NOT for order status."</text>
  <text x="40" y="320" fill="#4ade80" font-size="10">✅ lookup_order: "Retrieves an ORDER by id. Returns status & tracking."</text>

  <text x="400" y="342" text-anchor="middle" fill="#555" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
