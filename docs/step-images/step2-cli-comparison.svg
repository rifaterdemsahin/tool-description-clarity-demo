<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <rect width="800" height="400" fill="#0a0a1a" rx="8"/>
  <text x="400" y="40" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">💻 CLI Demo — Side-by-Side Terminal Comparison</text>

  <!-- Naive terminal -->
  <rect x="20" y="55" width="370" height="160" rx="6" fill="#0d0d0d" stroke="#e94560" stroke-width="1"/>
  <text x="205" y="78" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">❌ Naive Agent Terminal</text>
  <line x1="30" y1="87" x2="380" y2="87" stroke="#e94560" stroke-width="0.3"/>
  <text x="30" y="107" fill="#e94560" font-size="9" font-family="monospace">$ node demo.js --naive</text>
  <text x="30" y="125" fill="#ff6b6b" font-size="9" font-family="monospace">Q1: get_customer ← WRONG (expected lookup_order)</text>
  <text x="30" y="141" fill="#ff6b6b" font-size="9" font-family="monospace">Q4: get_customer ← WRONG (expected lookup_order)</text>
  <text x="30" y="157" fill="#ff6b6b" font-size="9" font-family="monospace">Q7: get_customer ← WRONG (expected lookup_order)</text>
  <text x="30" y="173" fill="#ccc" font-size="9" font-family="monospace">Accuracy: 45% | Avg Tokens: 900/q</text>
  <text x="30" y="189" fill="#e94560" font-size="9" font-family="monospace">Coordinator Interventions: 6 | Waste: high</text>

  <!-- Resilient terminal -->
  <rect x="410" y="55" width="370" height="160" rx="6" fill="#0d0d0d" stroke="#4ade80" stroke-width="1"/>
  <text x="595" y="78" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">✅ Resilient Agent Terminal</text>
  <line x1="420" y1="87" x2="770" y2="87" stroke="#4ade80" stroke-width="0.3"/>
  <text x="420" y="107" fill="#4ade80" font-size="9" font-family="monospace">$ node demo.js --resilient</text>
  <text x="420" y="125" fill="#4ade80" font-size="9" font-family="monospace">Q1: lookup_order ← CORRECT ✅</text>
  <text x="420" y="141" fill="#4ade80" font-size="9" font-family="monospace">Q4: lookup_order ← CORRECT ✅</text>
  <text x="420" y="157" fill="#4ade80" font-size="9" font-family="monospace">Q7: lookup_order ← CORRECT ✅</text>
  <text x="420" y="173" fill="#ccc" font-size="9" font-family="monospace">Accuracy: 95% | Avg Tokens: 500/q</text>
  <text x="420" y="189" fill="#4ade80" font-size="9" font-family="monospace">Coordinator Interventions: 0 | Waste: minimal</text>

  <!-- Comparison table -->
  <rect x="20" y="235" width="760" height="145" rx="6" fill="#0d1f2d" stroke="#00d4aa" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">📊 Comparison Summary</text>
  <line x1="30" y1="270" x2="770" y2="270" stroke="#00d4aa" stroke-width="0.5"/>

  <text x="50" y="295" fill="#fff" font-size="10" font-weight="bold">Metric</text>
  <text x="250" y="295" fill="#e94560" font-size="10" font-weight="bold" text-anchor="middle">Naive ❌</text>
  <text x="450" y="295" fill="#4ade80" font-size="10" font-weight="bold" text-anchor="middle">Resilient ✅</text>
  <text x="650" y="295" fill="#ffd700" font-size="10" font-weight="bold" text-anchor="middle">Delta 🚀</text>

  <text x="50" y="318" fill="#ccc" font-size="10">Accuracy</text>
  <text x="250" y="318" fill="#e94560" font-size="10" text-anchor="middle">45%</text>
  <text x="450" y="318" fill="#4ade80" font-size="10" text-anchor="middle">95%</text>
  <text x="650" y="318" fill="#ffd700" font-size="10" text-anchor="middle">+50pp</text>

  <text x="50" y="338" fill="#ccc" font-size="10">Avg Tokens/Q</text>
  <text x="250" y="338" fill="#e94560" font-size="10" text-anchor="middle">900</text>
  <text x="450" y="338" fill="#4ade80" font-size="10" text-anchor="middle">500</text>
  <text x="650" y="338" fill="#ffd700" font-size="10" text-anchor="middle">-44%</text>

  <text x="50" y="358" fill="#ccc" font-size="10">Token Savings</text>
  <text x="250" y="358" fill="#e94560" font-size="10" text-anchor="middle">—</text>
  <text x="450" y="358" fill="#4ade80" font-size="10" text-anchor="middle">6,000</text>
  <text x="650" y="358" fill="#ffd700" font-size="10" text-anchor="middle">44% less</text>

  <text x="400" y="392" text-anchor="middle" fill="#555" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
