<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace">
  <rect width="800" height="500" fill="#0a0a1a" rx="8"/>
  <text x="400" y="40" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">✅ Resilient: Clear Tool Descriptions</text>

  <!-- Three pillars -->
  <rect x="30" y="60" width="230" height="180" rx="8" fill="#0a2d10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="145" y="90" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">🏖️ Pillar 1: Context:Fork</text>
  <text x="45" y="115" fill="#ccc" font-size="10">Sandbox isolation per tool</text>
  <text x="45" y="135" fill="#aaa" font-size="9">Each tool has its own</text>
  <text x="45" y="153" fill="#aaa" font-size="9">entity domain boundary</text>
  <text x="45" y="178" fill="#4ade80" font-size="10">"customer" ≠ "order"</text>
  <text x="45" y="198" fill="#888" font-size="9">Explicit NOT clauses</text>
  <text x="45" y="218" fill="#888" font-size="9">prevent cross-domain</text>

  <rect x="285" y="60" width="230" height="180" rx="8" fill="#0a2d10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">🛡️ Pillar 2: Clear Labels</text>
  <text x="300" y="115" fill="#ccc" font-size="10">Explicit semantic boundaries</text>
  <text x="300" y="135" fill="#aaa" font-size="9">"Retrieves CUSTOMER profile"</text>
  <text x="300" y="153" fill="#aaa" font-size="9">"Retrieves ORDER by id"</text>
  <text x="300" y="178" fill="#4ade80" font-size="10">Distinct entity names</text>
  <text x="300" y="198" fill="#888" font-size="9">LLM matches intent</text>
  <text x="300" y="218" fill="#888" font-size="9">to correct tool schema</text>

  <rect x="540" y="60" width="230" height="180" rx="8" fill="#0a2d10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="655" y="90" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">🔍 Pillar 3: Arg Hint</text>
  <text x="555" y="115" fill="#ccc" font-size="10">Explicit parameter schema</text>
  <text x="555" y="135" fill="#aaa" font-size="9">"order_id: Unique</text>
  <text x="555" y="153" fill="#aaa" font-size="9">identifier of the order"</text>
  <text x="555" y="178" fill="#4ade80" font-size="10">Argument-level clarity</text>
  <text x="555" y="198" fill="#888" font-size="9">Prevents parameter</text>
  <text x="555" y="218" fill="#888" font-size="9">mismatch errors</text>

  <!-- Success area -->
  <rect x="30" y="270" width="740" height="90" rx="8" fill="#0a2d10" stroke="#4ade80" stroke-width="2"/>
  <text x="400" y="300" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="bold">✅ CORRECT TOOL SELECTED: lookup_order</text>
  <text x="400" y="325" text-anchor="middle" fill="#ccc" font-size="13">Descriptions explicitly distinguish entity domains → LLM matches intent to correct tool on first attempt</text>
  <text x="400" y="348" text-anchor="middle" fill="#aaa" font-size="11">No retries • No coordinator corrections • No confused users</text>

  <!-- Before/After code snippets -->
  <rect x="30" y="380" width="355" height="95" rx="6" fill="#1a0a0a" stroke="#e94560" stroke-width="1"/>
  <text x="207" y="400" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">❌ BEFORE (Naive)</text>
  <text x="45" y="422" fill="#ccc" font-size="10" font-family="monospace">"Gets a customer record from</text>
  <text x="45" y="440" fill="#ccc" font-size="10" font-family="monospace"> the system."  ← No entity scope</text>
  <text x="45" y="462" fill="#888" font-size="9">⚠ LLM matches any query → wrong tool</text>

  <rect x="415" y="380" width="355" height="95" rx="6" fill="#0a2d10" stroke="#4ade80" stroke-width="1"/>
  <text x="592" y="400" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">✅ AFTER (Resilient)</text>
  <text x="430" y="422" fill="#ccc" font-size="10" font-family="monospace">"Retrieves a CUSTOMER profile</text>
  <text x="430" y="440" fill="#ccc" font-size="10" font-family="monospace"> by id. NOT for order status."</text>
  <text x="430" y="462" fill="#4ade80" font-size="9">✅ Explicit scope → correct tool always</text>

  <text x="400" y="492" text-anchor="middle" fill="#555" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
