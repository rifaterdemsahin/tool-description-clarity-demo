<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>
  <rect width="900" height="650" fill="#0a0a1a" rx="8"/>
  <text x="450" y="38" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">🏗️ UML Class Diagram — Tool Selection Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#888" font-size="11">⚡ Generated by DeepSeek V4 Flash (Auto-Detect Executing AI Assistant Model)</text>

  <!-- Class: Query -->
  <rect x="40" y="80" width="240" height="130" rx="6" fill="#0d1f2d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="160" y="105" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">📋 Query</text>
  <line x1="40" y1="115" x2="280" y2="115" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="55" y="135" fill="#ccc" font-size="11">+ id: string</text>
  <text x="55" y="155" fill="#ccc" font-size="11">+ text: string</text>
  <text x="55" y="175" fill="#ccc" font-size="11">+ expectedTool: string</text>
  <line x1="40" y1="185" x2="280" y2="185" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="55" y="200" fill="#aaa" font-size="10" font-style="italic">constructor({id,text,expectedTool})</text>

  <!-- Class: ToolDefinition -->
  <rect x="340" y="80" width="250" height="155" rx="6" fill="#0d1f2d" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="465" y="105" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">🔧 ToolDefinition</text>
  <line x1="340" y1="115" x2="590" y2="115" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="355" y="135" fill="#ccc" font-size="11">+ name: string</text>
  <text x="355" y="155" fill="#00d4aa" font-size="11" font-weight="bold">+ description: string  ◄ KEY</text>
  <text x="355" y="175" fill="#ccc" font-size="11">+ parameters: JSONSchema</text>
  <line x1="340" y1="185" x2="590" y2="185" stroke="#00d4aa" stroke-width="0.5"/>
  <text x="355" y="202" fill="#aaa" font-size="10">NAIVE_TOOLS: ToolDefinition[]</text>
  <text x="355" y="218" fill="#aaa" font-size="10">RESILIENT_TOOLS: ToolDefinition[]</text>

  <!-- Class: SubagentNaive -->
  <rect x="40" y="280" width="260" height="115" rx="6" fill="#2d0a0a" stroke="#e94560" stroke-width="1.5"/>
  <text x="170" y="305" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">❌ SubagentNaive</text>
  <line x1="40" y1="315" x2="300" y2="315" stroke="#e94560" stroke-width="0.5"/>
  <text x="55" y="338" fill="#ccc" font-size="11">+ processNaive(query, tools)</text>
  <text x="55" y="358" fill="#aaa" font-size="10">→ ambiguous matching</text>
  <text x="55" y="378" fill="#aaa" font-size="10">→ 60% wrong-tool rate</text>

  <!-- Class: SubagentResilient -->
  <rect x="340" y="280" width="290" height="115" rx="6" fill="#0a2d0a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="485" y="305" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">✅ SubagentResilient</text>
  <line x1="340" y1="315" x2="630" y2="315" stroke="#4ade80" stroke-width="0.5"/>
  <text x="355" y="338" fill="#ccc" font-size="11">+ processResilient(query, tools)</text>
  <text x="355" y="358" fill="#aaa" font-size="10">→ explicit entity-boundary matching</text>
  <text x="355" y="378" fill="#aaa" font-size="10">→ 95%+ first-attempt accuracy</text>

  <!-- Class: Coordinator -->
  <rect x="200" y="460" width="260" height="100" rx="6" fill="#1a1a3e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="330" y="485" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="bold">🎯 Coordinator</text>
  <line x1="200" y1="495" x2="460" y2="495" stroke="#818cf8" stroke-width="0.5"/>
  <text x="215" y="518" fill="#ccc" font-size="11">+ runNaiveScenario()</text>
  <text x="215" y="538" fill="#ccc" font-size="11">+ runResilientScenario()</text>
  <text x="215" y="555" fill="#ccc" font-size="11">+ runBothScenarios()</text>

  <!-- Arrows -->
  <line x1="280" y1="145" x2="340" y2="145" stroke="#00d4aa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="310" y="138" fill="#00d4aa" font-size="8">uses</text>

  <line x1="300" y1="337" x2="340" y2="337" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="315" y="330" fill="#4ade80" font-size="8">extends</text>

  <line x1="170" y1="395" x2="230" y2="460" stroke="#333" stroke-width="1"/>
  <line x1="490" y1="395" x2="430" y2="460" stroke="#333" stroke-width="1"/>

  <!-- Infrastructure -->
  <rect x="680" y="280" width="200" height="140" rx="6" fill="#1a1a2e" stroke="#ffd700" stroke-width="1"/>
  <text x="780" y="305" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">🏗️ Infrastructure</text>
  <line x1="680" y1="315" x2="880" y2="315" stroke="#ffd700" stroke-width="0.5"/>
  <text x="695" y="338" fill="#ccc" font-size="10">getCustomerById(id)</text>
  <text x="695" y="358" fill="#ccc" font-size="10">lookupOrderById(id)</text>
  <text x="695" y="378" fill="#ccc" font-size="10">searchOrders(query)</text>
  <text x="695" y="398" fill="#ccc" font-size="10">refundOrderById(id,amt)</text>
  <text x="695" y="415" fill="#aaa" font-size="9">AgentError, TransientError</text>

  <line x1="640" y1="340" x2="680" y2="340" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="40" y="590" width="820" height="45" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="60" y="618" fill="#e94560" font-size="10">❌ Naive</text>
  <text x="170" y="618" fill="#4ade80" font-size="10">✅ Resilient</text>
  <text x="280" y="618" fill="#818cf8" font-size="10">🎯 Coordinator</text>
  <text x="400" y="618" fill="#00d4aa" font-size="10">📋 Domain</text>
  <text x="510" y="618" fill="#ffd700" font-size="10">🏗️ Infrastructure</text>
  <text x="650" y="618" fill="#888" font-size="9">Generated by DeepSeek V4 Flash • Claude AI Architect Exam</text>
</svg>
