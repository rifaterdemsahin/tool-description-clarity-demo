<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="monospace">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4ade80"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00d4aa"/></marker>
  </defs>
  <rect width="1000" height="750" fill="#0a0a1a" rx="8"/>
  <text x="500" y="38" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">⚡ UML Sequence Diagram — Runtime Tool Selection Flow</text>
  <text x="500" y="56" text-anchor="middle" fill="#888" font-size="10">⚡ Generated by DeepSeek V4 Flash (Auto-Detect Executing AI Assistant Model)</text>

  <!-- Lifeline headers -->
  <rect x="30" y="75" width="120" height="28" rx="4" fill="#e94560" opacity="0.8"/>
  <text x="90" y="94" text-anchor="middle" fill="white" font-size="11" font-weight="bold">User Query</text>

  <rect x="200" y="75" width="140" height="28" rx="4" fill="#818cf8" opacity="0.8"/>
  <text x="270" y="94" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Coordinator</text>

  <rect x="400" y="75" width="140" height="28" rx="4" fill="#e94560" opacity="0.8"/>
  <text x="470" y="94" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Naive Agent</text>

  <rect x="600" y="75" width="140" height="28" rx="4" fill="#4ade80" opacity="0.8"/>
  <text x="670" y="94" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Resilient Agent</text>

  <rect x="800" y="75" width="120" height="28" rx="4" fill="#ffd700" opacity="0.8"/>
  <text x="860" y="94" text-anchor="middle" fill="#0a0a1a" font-size="11" font-weight="bold">Infra</text>

  <!-- Lifelines -->
  <line x1="90" y1="103" x2="90" y2="720" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="270" y1="103" x2="270" y2="720" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="470" y1="103" x2="470" y2="720" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="670" y1="103" x2="670" y2="720" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="860" y1="103" x2="860" y2="720" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Naive Flow (Red) -->
  <text x="15" y="130" fill="#e94560" font-size="12" font-weight="bold">SCENARIO 1: NAIVE (RED)</text>

  <!-- Step 1 -->
  <line x1="90" y1="150" x2="270" y2="150" stroke="#e94560" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="180" y="143" fill="#e94560" font-size="9">"Where is order ORD-9012?"</text>

  <line x1="270" y1="170" x2="470" y2="170" stroke="#e94560" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="370" y="163" fill="#e94560" font-size="9">process("Q1", naive_tools)</text>

  <rect x="475" y="185" width="195" height="60" rx="4" fill="#2d0a0a" stroke="#e94560" stroke-width="0.5"/>
  <text x="572" y="202" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">⚠ Tool Matching (Naive)</text>
  <text x="485" y="218" fill="#e94560" font-size="8">- "order" word in query</text>
  <text x="485" y="233" fill="#e94560" font-size="8">- desc: "Gets a customer record"</text>
  <text x="485" y="248" fill="#e94560" font-size="8">- desc too vague → picks get_customer ❌</text>

  <line x1="470" y1="260" x2="860" y2="260" stroke="#e94560" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="665" y="253" fill="#e94560" font-size="9">getCustomerById("CUST-101") ← WRONG TOOL</text>

  <rect x="865" y="275" width="110" height="25" rx="3" fill="#2d0a0a" stroke="#e94560" stroke-width="0.5"/>
  <text x="920" y="293" text-anchor="middle" fill="#e94560" font-size="9">Returns Customer ❌</text>

  <line x1="860" y1="310" x2="470" y2="310" stroke="#e94560" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="665" y="325" fill="#e94560" font-size="9">wrong entity → user confused</text>

  <!-- Resilient Flow (Green) -->
  <text x="15" y="380" fill="#4ade80" font-size="12" font-weight="bold">SCENARIO 2: RESILIENT (GREEN)</text>

  <line x1="90" y1="400" x2="270" y2="400" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="180" y="393" fill="#4ade80" font-size="9">"Where is order ORD-9012?"</text>

  <line x1="270" y1="420" x2="670" y2="420" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="470" y="413" fill="#4ade80" font-size="9">process("Q1", resilient_tools)</text>

  <rect x="675" y="440" width="195" height="60" rx="4" fill="#0a2d0a" stroke="#4ade80" stroke-width="0.5"/>
  <text x="772" y="457" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">✅ Tool Matching (Clear Desc)</text>
  <text x="685" y="473" fill="#4ade80" font-size="8">- desc: "Retrieves an ORDER..."</text>
  <text x="685" y="488" fill="#4ade80" font-size="8">- "NOT for order status" on get_customer</text>
  <text x="685" y="503" fill="#4ade80" font-size="8">- unambiguously → lookup_order ✅</text>

  <line x1="670" y1="515" x2="860" y2="515" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="765" y="508" fill="#4ade80" font-size="9">lookupOrderById("ORD-9012") ✅</text>

  <rect x="865" y="530" width="110" height="25" rx="3" fill="#0a2d0a" stroke="#4ade80" stroke-width="0.5"/>
  <text x="920" y="548" text-anchor="middle" fill="#4ade80" font-size="9">Returns Order ✅</text>

  <line x1="860" y1="565" x2="670" y2="565" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="765" y="580" fill="#4ade80" font-size="9">correct entity → user happy 🎉</text>

  <!-- Metrics Comparison -->
  <rect x="90" y="620" width="820" height="85" rx="6" fill="#0d1f2d" stroke="#00d4aa" stroke-width="1"/>
  <text x="500" y="645" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">📊 Outcome Comparison</text>
  <text x="140" y="668" fill="#e94560" font-size="11">❌ Naive: 40-60% correct tool selection • High token waste • User confusion</text>
  <text x="140" y="688" fill="#4ade80" font-size="11">✅ Resilient: 95%+ correct tool selection • 40% fewer tokens • User satisfaction</text>

  <!-- Labels -->
  <text x="500" y="730" text-anchor="middle" fill="#888" font-size="9">⚡ Generated by DeepSeek V4 Flash • Claude AI Architect Exam — Tool Description Clarity</text>
</svg>
